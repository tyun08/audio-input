name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.result }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV:+${PREV}..HEAD}"
          RANGE="${RANGE:-HEAD}"
          {
            echo "body<<EOF"
            git log $RANGE --pretty=format:"- %s" | grep -v "^- Merge " | grep -v "^- docs:" | head -30
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Audio Input ${context.ref.replace('refs/tags/', '')}`,
              body: `${{ steps.notes.outputs.body }}`,
              draft: true,
            });
            return data.id;
          result-encoding: string

  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust (aarch64 target on macOS)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version from tag into tauri.conf.json
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

  update-cask:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' }}

    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit v${{ needs.create-release.outputs.version }} \
            --draft=false \
            --repo tyun08/audio-input

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*aarch64.dmg" \
            -O arm.dmg
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*x64.dmg" \
            -O intel.dmg
          SHA_ARM=$(shasum -a 256 arm.dmg | awk '{print $1}')
          SHA_INTEL=$(shasum -a 256 intel.dmg | awk '{print $1}')
          echo "sha256_arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$SHA_INTEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tyun08/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update cask formula
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          SHA_ARM=${{ steps.sha.outputs.sha256_arm }}
          SHA_INTEL=${{ steps.sha.outputs.sha256_intel }}
          sed -i "s/version \".*\"/version \"${VERSION}\"/" tap/Casks/audio-input.rb
          # Update arm sha256 (first occurrence)
          sed -i "0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${SHA_ARM}\"/}" tap/Casks/audio-input.rb
          # Update intel sha256 (second occurrence)
          sed -i "0,/sha256 \".*\"/{!s/sha256 \".*\"/sha256 \"${SHA_INTEL}\"/}" tap/Casks/audio-input.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/audio-input.rb
          git diff --cached --quiet || git commit -m "chore: update audio-input to v${{ steps.sha.outputs.version }}"
          git push
