name: Release

on:
  push:
    tags:
      # Strict semver only — prevents test tags like v0.4.5-test from triggering
      # a production release + homebrew tap update.
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.result }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV:+${PREV}..HEAD}"
          RANGE="${RANGE:-HEAD}"
          {
            echo "body<<EOF"
            git log $RANGE --pretty=format:"- %s" | grep -v "^- Merge " | grep -v "^- docs:" | head -30
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Audio Input ${context.ref.replace('refs/tags/', '')}`,
              body: `${{ steps.notes.outputs.body }}`,
              draft: true,
            });
            return data.id;
          result-encoding: string

  build-macos:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
          - args: '--target x86_64-apple-darwin'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version from tag into tauri.conf.json
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create + configure a dedicated keychain (isolated from the login one)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Put our keychain in the search list BEFORE the import — some tools
          # only consider identities in keychains on the active search list.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          # Import the P12. -A lets any application use the key without
          # prompting (we don't have a UI on CI to confirm). -T also gives
          # codesign/security explicit allow.
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          # Allow the imported private key to be used without prompting (needed
          # for codesign in non-interactive CI).
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Diagnostics
          echo "=== Search list ==="
          security list-keychains -d user
          echo "=== All identities in build keychain ==="
          security find-identity "$KEYCHAIN_PATH"
          echo "=== Valid codesigning identities (system-wide search) ==="
          security find-identity -v -p codesigning

          rm -f "$CERT_PATH"

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri.conf.json already sets the signing identity. These env vars
          # tell tauri-action to also notarize via notarytool after bundling.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

  build-windows:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version from tag into tauri.conf.json
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}

  update-cask:
    needs: [create-release, build-macos]
    runs-on: ubuntu-latest
    if: ${{ needs.build-macos.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit v${{ needs.create-release.outputs.version }} \
            --draft=false \
            --repo tyun08/audio-input

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*aarch64.dmg" \
            -O arm.dmg
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*x64.dmg" \
            -O intel.dmg
          SHA_ARM=$(shasum -a 256 arm.dmg | awk '{print $1}')
          SHA_INTEL=$(shasum -a 256 intel.dmg | awk '{print $1}')
          echo "sha256_arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$SHA_INTEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tyun08/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update cask formula
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          SHA_ARM=${{ steps.sha.outputs.sha256_arm }}
          SHA_INTEL=${{ steps.sha.outputs.sha256_intel }}
          sed -i "s/version \".*\"/version \"${VERSION}\"/" tap/Casks/audio-input.rb
          sed -i "0,/sha256 \".*\"/{s/sha256 \".*\"/sha256 \"${SHA_ARM}\"/}" tap/Casks/audio-input.rb
          sed -i "0,/sha256 \".*\"/{!s/sha256 \".*\"/sha256 \"${SHA_INTEL}\"/}" tap/Casks/audio-input.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/audio-input.rb
          git diff --cached --quiet || git commit -m "chore: update audio-input to v${{ steps.sha.outputs.version }}"
          git push
