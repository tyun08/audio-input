name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  create-release:
    # Only RELEASE commits ship a release. Everything else on main (docs, ci,
    # follow-up fixes) merges silently. See RELEASING.md for the flow that
    # generates these commits via the auto-bump-version workflow on PR open.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'RELEASE ')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.result }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: meta
        run: |
          # Subject line must be: RELEASE <semver>
          # Accepts an optional " (#N)" squash-merge suffix that GitHub appends
          # automatically (e.g. "RELEASE 0.4.12 (#89)"). Still rejects
          # "RELEASE 0.4.10-beta", double spaces, and other malformed variants.
          MSG=$(git log -1 --pretty=%s)
          if [[ ! "$MSG" =~ ^RELEASE\ ([0-9]+\.[0-9]+\.[0-9]+)(\s+\(#[0-9]+\))?$ ]]; then
            echo "::error::Commit message '$MSG' is not a strict 'RELEASE X.Y.Z' release commit."
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Refuse if a release already exists for this version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Catches the case where v0.4.X was already released (perhaps a
          # previous failed run that got recovered manually) but main got
          # another "RELEASE 0.4.X" commit. Without this, we'd create a
          # SECOND GitHub release for the same tag — artifacts split, the
          # homebrew tap update looks at the wrong one. This is exactly how
          # v0.4.11 broke historically.
          TAG="v${{ steps.meta.outputs.version }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::error::A release for $TAG already exists. Bump to a new version (see RELEASING.md) or delete the existing release if it was a failed run."
            exit 1
          fi
          echo "No pre-existing release for $TAG — safe to proceed."

      - name: Verify source files match commit-message version
        run: |
          # Defense in depth: scripts/bump-version.sh and the auto-bump
          # workflow should have already synced these. If somehow they're
          # out of sync (manual commit that hand-edited the message?), the
          # binary would be misbranded — internal version string says
          # 0.4.x but tauri-action labels artifacts as 0.5.0.
          REL_V="${{ steps.meta.outputs.version }}"
          PKG_V=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -1)
          CARGO_V=$(sed -n 's/^version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/Cargo.toml | head -1)
          TAURI_V=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
          echo "commit-msg:         ${REL_V}"
          echo "package.json:       ${PKG_V}"
          echo "Cargo.toml:         ${CARGO_V}"
          echo "tauri.conf.json:    ${TAURI_V}"
          fail=0
          [ "${REL_V}" = "${PKG_V}" ]   || { echo "::error::package.json version (${PKG_V}) does not match commit-msg (${REL_V})"; fail=1; }
          [ "${REL_V}" = "${CARGO_V}" ] || { echo "::error::Cargo.toml version (${CARGO_V}) does not match commit-msg (${REL_V})"; fail=1; }
          [ "${REL_V}" = "${TAURI_V}" ] || { echo "::error::tauri.conf.json version (${TAURI_V}) does not match commit-msg (${REL_V})"; fail=1; }
          if [ "${fail}" -eq 1 ]; then
            echo ""
            echo "::error::Run 'npm run release:bump ${REL_V}' and amend the commit — see RELEASING.md."
            exit 1
          fi
          echo "All version fields match the commit-msg — proceeding."

      - name: Generate release notes
        id: notes
        run: |
          PREV=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV:+${PREV}..HEAD}"
          RANGE="${RANGE:-HEAD}"
          {
            echo "body<<EOF"
            git log $RANGE --pretty=format:"- %s" | grep -v "^- Merge " | grep -v "^- docs:" | head -30
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Audio Input ${tag}`,
              // Pin the eventual tag to THIS commit, not whatever main's HEAD
              // happens to be when the release is published. Without this,
              // a follow-up commit landing on main mid-build would cause
              // the tag to point at the wrong commit when update-cask
              // flips draft → public.
              target_commitish: context.sha,
              body: `${{ steps.notes.outputs.body }}`,
              draft: true,
            });
            return data.id;
          result-encoding: string

  build-macos:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - args: '--target aarch64-apple-darwin'
          - args: '--target x86_64-apple-darwin'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version into tauri.conf.json
        shell: bash
        run: |
          # Defense in depth — create-release already verified that source
          # files match the release version, but tauri-action reads from
          # tauri.conf.json so any drift would mis-label artifacts.
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          # Create + configure a dedicated keychain (isolated from the login one)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Put our keychain in the search list BEFORE the import — some tools
          # only consider identities in keychains on the active search list.
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          # Import the P12. -A lets any application use the key without
          # prompting (we don't have a UI on CI to confirm). -T also gives
          # codesign/security explicit allow.
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          # Allow the imported private key to be used without prompting (needed
          # for codesign in non-interactive CI).
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null

          # Diagnostics
          echo "=== Search list ==="
          security list-keychains -d user
          echo "=== All identities in build keychain ==="
          security find-identity "$KEYCHAIN_PATH"
          echo "=== Valid codesigning identities (system-wide search) ==="
          security find-identity -v -p codesigning

          rm -f "$CERT_PATH"

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # tauri.conf.json already sets the signing identity. These env vars
          # tell tauri-action to also notarize via notarytool after bundling.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater signing — tauri-action signs the .app.tar.gz / .msi.zip
          # update artifacts with this private key. Public key lives in
          # tauri.conf.json so the app verifies the signature on download.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          args: ${{ matrix.args }}

  build-windows:
    needs: create-release
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      - name: Sync version into tauri.conf.json
        shell: bash
        run: |
          # Defense in depth — create-release already verified that source
          # files match the release version, but tauri-action reads from
          # tauri.conf.json so any drift would mis-label artifacts.
          VERSION=${{ needs.create-release.outputs.version }}
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json

      - name: Install WiX Toolset (for MSI bundling)
        shell: pwsh
        run: |
          # windows-latest no longer ships WiX preinstalled. tauri's MSI bundler
          # needs candle.exe + light.exe (WiX v3) on PATH. NSIS is pulled in by
          # tauri itself on first build.
          choco install --no-progress -y wixtoolset

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}

  # Build the updater manifest (latest.json) and upload it to the release so
  # the tauri-plugin-updater endpoint can find it. App pings:
  #   https://github.com/tyun08/audio-input/releases/latest/download/latest.json
  # which always resolves to the freshest published release.
  publish-updater-manifest:
    needs: [create-release, build-macos, build-windows]
    # always() so a failing build-windows doesn't skip the macOS-only manifest.
    # The script tolerates missing platforms (only includes ones whose .sig
    # was found in the release).
    if: ${{ always() && needs.build-macos.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signature files from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/sigs
          gh release download v${{ needs.create-release.outputs.version }} \
            --repo tyun08/audio-input \
            --pattern "*.sig" \
            --dir /tmp/sigs || true
          ls -la /tmp/sigs

      - name: Generate latest.json
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -e
          BASE="https://github.com/tyun08/audio-input/releases/download/v${VERSION}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Helper: read sig file by glob; output empty string if missing so
          # we can fall back to a partial-platform manifest. tauri-plugin-updater
          # ignores platforms whose signature/url are missing.
          read_sig() {
            local f=$(ls /tmp/sigs/$1 2>/dev/null | head -1)
            [ -n "$f" ] && cat "$f" | tr -d '\n' || echo ""
          }

          SIG_ARM=$(read_sig "*aarch64.app.tar.gz.sig")
          SIG_INTEL=$(read_sig "*x64.app.tar.gz.sig")
          # Tauri v2 signs the NSIS installer .exe directly (no .zip wrapper).
          # The updater downloads + executes the .exe; its signature is what
          # ships in latest.json.
          SIG_WIN=$(read_sig "*x64-setup.exe.sig")

          # Build manifest. Only include platforms with both a sig and a URL.
          # NOTE on filename quirks: Tauri's macOS updater bundle is named
          # without the version suffix (e.g. Audio.Input_aarch64.app.tar.gz),
          # but the Windows NSIS installer DOES include the version. Don't
          # "fix" these into a uniform pattern — they come from tauri-action
          # and must match the actual asset names on the release.
          PLATFORMS="{}"
          if [ -n "$SIG_ARM" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$SIG_ARM" --arg u "${BASE}/Audio.Input_aarch64.app.tar.gz" \
              '. + {"darwin-aarch64": {signature: $s, url: $u}}')
          fi
          if [ -n "$SIG_INTEL" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$SIG_INTEL" --arg u "${BASE}/Audio.Input_x64.app.tar.gz" \
              '. + {"darwin-x86_64": {signature: $s, url: $u}}')
          fi
          if [ -n "$SIG_WIN" ]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg s "$SIG_WIN" --arg u "${BASE}/Audio.Input_${VERSION}_x64-setup.exe" \
              '. + {"windows-x86_64": {signature: $s, url: $u}}')
          fi

          jq -n --arg v "$VERSION" --arg d "$DATE" --arg n "See https://github.com/tyun08/audio-input/releases/tag/v${VERSION} for the full release notes." --argjson p "$PLATFORMS" \
            '{version: $v, notes: $n, pub_date: $d, platforms: $p}' > latest.json

          echo "=== latest.json ==="
          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v${{ needs.create-release.outputs.version }} latest.json \
            --repo tyun08/audio-input \
            --clobber

  update-cask:
    needs: [create-release, build-macos]
    runs-on: ubuntu-latest
    if: ${{ needs.build-macos.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit v${{ needs.create-release.outputs.version }} \
            --draft=false \
            --repo tyun08/audio-input

      - name: Download DMGs and compute SHA256
        id: sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*aarch64.dmg" \
            -O arm.dmg
          gh release download v${VERSION} \
            --repo tyun08/audio-input \
            --pattern "*x64.dmg" \
            -O intel.dmg
          SHA_ARM=$(shasum -a 256 arm.dmg | awk '{print $1}')
          SHA_INTEL=$(shasum -a 256 intel.dmg | awk '{print $1}')
          echo "sha256_arm=$SHA_ARM" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$SHA_INTEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: tyun08/homebrew-tap
          token: ${{ secrets.TAP_TOKEN }}
          path: tap

      - name: Update cask formula
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          SHA_ARM=${{ steps.sha.outputs.sha256_arm }}
          SHA_INTEL=${{ steps.sha.outputs.sha256_intel }}
          # Cask has per-arch blocks: on_arm do ... end / on_intel do ... end.
          # Use block-scoped addresses so each arch gets its own version + sha
          # updated independently. The previous "0,/sha256/{!s/.../}" hack
          # silently no-op'd in GNU sed and shipped a stale intel sha.
          sed -i "/on_arm do/,/^  end$/ {
            s/version \".*\"/version \"${VERSION}\"/
            s/sha256 \".*\"/sha256 \"${SHA_ARM}\"/
          }" tap/Casks/audio-input.rb
          sed -i "/on_intel do/,/^  end$/ {
            s/version \".*\"/version \"${VERSION}\"/
            s/sha256 \".*\"/sha256 \"${SHA_INTEL}\"/
          }" tap/Casks/audio-input.rb
          echo "=== Updated cask ==="
          head -16 tap/Casks/audio-input.rb

      - name: Commit and push
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/audio-input.rb
          git diff --cached --quiet || git commit -m "chore: update audio-input to v${{ steps.sha.outputs.version }}"
          git push
