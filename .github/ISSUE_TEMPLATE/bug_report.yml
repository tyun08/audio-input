name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "e.g. v0.2.0"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Mac Architecture
      options:
        - Apple Silicon (M1/M2/M3/M4)
        - Intel
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS Version
      placeholder: "e.g. Sequoia 15.3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press ⌘⇧Space
        2. Speak for 5 seconds
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (if any)
      description: Paste any relevant output from Console.app (filter by "audioinput")
      render: shell
